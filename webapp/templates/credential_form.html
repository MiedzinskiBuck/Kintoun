{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>{% if credential %}Edit Credential{% else %}New Credential{% endif %}</h1>
  <form method="post" class="form-grid">
    <label>Name
      <input type="text" name="name" value="{{ credential.name if credential else '' }}" required>
    </label>
    <label>AWS Profile
      <input type="text" name="profile" value="{{ credential.profile if credential else '' }}" placeholder="optional">
    </label>
    <label>AWS Access Key ID
      <input type="text" name="access_key" value="{{ credential.access_key if credential else '' }}" placeholder="optional">
    </label>
    <label>AWS Secret Access Key
      <input type="password" name="secret_key" value="{{ credential.secret_key if credential else '' }}" placeholder="optional">
    </label>
    <label>AWS Session Token
      <textarea name="session_token" rows="4" placeholder="optional">{{ credential.session_token if credential else '' }}</textarea>
    </label>
    <button type="submit">Save</button>
  </form>
</section>
{% endblock %}
